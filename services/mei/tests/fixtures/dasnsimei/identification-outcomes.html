<!doctype html>
<html lang="pt-BR">
  <head><title>DASN-SIMEI - resultados de identificação sanitizados</title></head>
  <body data-portal-version="fixture-identification-v1">
    <form id="identification-form">
      <input type="hidden" name="__RequestVerificationToken" value="fixture-token">
      <label for="identificacao-cnpj">CNPJ</label>
      <input id="identificacao-cnpj" name="cnpj" type="text" inputmode="numeric">
      <div class="h-captcha" data-sitekey="public-fixture"></div>
      <textarea name="h-captcha-response" hidden></textarea>
      <button id="identificacao-continuar" type="submit">Continuar</button>
    </form>
    <div id="identification-validation" role="alert" hidden>
      A identificação informada não foi aceita.
    </div>
    <div id="public-captcha-rejection" class="alert-danger" role="alert" hidden>
      13896 - Impedido por proteção Captcha. Comportamento de Robô.
    </div>
    <div data-hcaptcha-challenge hidden>
      <iframe title="Desafio hCaptcha" style="width: 300px; height: 200px"></iframe>
    </div>
    <script>
      window.identificationSubmitCount = 0
      const outcome = new URLSearchParams(window.location.search).get('outcome') || 'auto-pass'
      document.querySelector('[name="h-captcha-response"]').addEventListener('change', (event) => {
        if (!event.target.value || outcome !== 'challenge') return
        document.querySelector('[data-hcaptcha-challenge]').hidden = true
        document.body.insertAdjacentHTML(
          'afterbegin',
          '<section id="iniciar-ano-calendario"><label><input type="radio" value="2024"><span>Transmitida em 31/05/2025</span></label></section>'
        )
      })
      document.querySelector('#identification-form').addEventListener('submit', (event) => {
        event.preventDefault()
        window.identificationSubmitCount += 1
        const token = (document.querySelector('[name="h-captcha-response"]') || {}).value || ''
        if (outcome === 'auto-pass') {
          document.querySelector('#identification-form').remove()
          document.body.insertAdjacentHTML(
            'afterbegin',
            '<section id="iniciar-ano-calendario"><label><input type="radio" value="2024"><span>Transmitida em 31/05/2025</span></label></section>'
          )
        } else if (outcome === 'challenge') {
          document.querySelector('[data-hcaptcha-challenge]').hidden = false
        } else if (outcome === 'captcha-rejection') {
          if (token && window.identificationSubmitCount >= 2) {
            document.querySelector('#public-captcha-rejection').hidden = true
            document.querySelector('#identification-form').remove()
            document.body.insertAdjacentHTML(
              'afterbegin',
              '<section id="iniciar-ano-calendario"><label><input type="radio" value="2024"><span>Transmitida em 31/05/2025</span></label></section>'
            )
          } else {
            document.querySelector('#public-captcha-rejection').hidden = false
          }
        } else if (outcome === 'validation') {
          document.querySelector('#identification-validation').hidden = false
        }
      })
    </script>
  </body>
</html>
