<!doctype html>
<html lang="pt-BR">
  <head><title>DASN SIMEI - Declaracao Anual</title></head>
  <body data-portal-version="2.11.0">
    <main>
      <h1>DASN SIMEI</h1>
      <form method="post" action="/dasnsimei.app/Identificacao/Continuar">
        <input type="hidden" name="__RequestVerificationToken" value="fixture-token">
        <label for="identificacao-cnpj">CNPJ</label>
        <input id="identificacao-cnpj" name="cnpj" type="text" maxlength="18" inputmode="numeric" autocomplete="off">
        <div class="h-captcha" data-sitekey="fixture"></div>
        <button id="identificacao-continuar" type="submit">Continuar</button>
      </form>
    </main>
  </body>
</html>
