<!doctype html>
<html lang="pt-BR">
  <head><title>PGMEI - Programa Gerador de DAS do Microempreendedor Individual</title></head>
  <body data-portal-version="3.17.0">
    <main>
      <h1>Programa Gerador de DAS do Microempreendedor Individual</h1>
      <form method="post" action="/pgmei.app/Identificacao/Continuar">
        <input type="hidden" name="__RequestVerificationToken" value="fixture-token">
        <label for="cnpj">CNPJ completo</label>
        <input id="cnpj" name="cnpj" type="text" autocomplete="off">
        <div class="h-captcha" data-sitekey="fixture"></div>
        <button id="continuar" type="submit">Continuar</button>
      </form>
    </main>
  </body>
</html>
