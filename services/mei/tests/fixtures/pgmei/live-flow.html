<!doctype html>
<html lang="pt-BR">
  <head><title>PGMEI - fluxo live simulado</title></head>
  <body>
    <form>
      <input type="hidden" name="__RequestVerificationToken" value="fixture-token">
      <input id="cnpj" name="cnpj" type="text" autocomplete="off">
      <div class="h-captcha" data-sitekey="public-fixture"></div>
      <textarea name="h-captcha-response" hidden></textarea>
      <button id="continuar" type="button">Continuar</button>
    </form>
    <script>
      window.emissionCount = 0
      window.identificationSubmitCount = 0
      window.updateCount = 0
      window.paymentDate = ''
      document.addEventListener('click', (event) => {
        const target = event.target
        if (!(target instanceof HTMLElement)) return
        if (target.id === 'continuar') {
          event.preventDefault()
          window.identificationSubmitCount += 1
          document.body.innerHTML = '<a id="emissao" href="/SimplesNacional/Aplicacoes/ATSPO/pgmei.app/emissao">Emitir Guia de Pagamento (DAS)</a>'
        } else if (target.id === 'emissao') {
          event.preventDefault()
          document.body.innerHTML = '<form><select id="anoCalendarioSelect"><option value="">Selecione</option><option value="2026">2026</option></select><button id="selecionar-ano" type="submit">Continuar</button></form>'
        } else if (target.id === 'selecionar-ano') {
          event.preventDefault()
          document.body.innerHTML = '<input type="checkbox" value="202601"><input type="checkbox" value="202602"><input id="dataPagamentoInformada" type="text"><button id="btnAtualizarValores" type="button">Atualizar Valores</button><button id="btnEmitirDas" type="button" disabled>Apurar/Gerar</button>'
        } else if (target.id === 'btnAtualizarValores') {
          event.preventDefault()
          window.updateCount += 1
          window.paymentDate = document.querySelector('#dataPagamentoInformada').value
          document.querySelector('#btnEmitirDas').disabled = false
        } else if (target.id === 'btnEmitirDas') {
          event.preventDefault()
          window.emissionCount += 1
          document.body.innerHTML = '<a href="/SimplesNacional/Aplicacoes/ATSPO/pgmei.app/emissao/imprimir/opaque">Imprimir</a>'
        }
      })
    </script>
  </body>
</html>
