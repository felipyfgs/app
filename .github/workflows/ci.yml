name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: curl, dom, mbstring, pcntl, pdo_sqlite, sodium, zip
      - uses: ramsey/composer-install@v3
        with:
          working-directory: apps/api
      - name: Validar dependências
        run: composer validate --strict --no-check-publish
      - name: Validar estilo
        run: vendor/bin/pint --test
      - name: Executar testes
        run: php artisan test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Instalar dependências
        run: pnpm install --frozen-lockfile
      - name: Validar lint
        run: pnpm run lint
      - name: Validar tipos
        run: pnpm run typecheck
      - name: Gerar SPA
        run: pnpm run generate
      - name: Executar testes unitários
        run: pnpm run test
      - name: Validar fidelidade ao arquétipo do change ativo
        run: pnpm run test:fidelity
      # Política: gate frontend = lint + typecheck + generate + vitest unit + fidelity.
      # Playwright E2E foi desabilitado (custo de RAM/CPU no VPS/CI e sessões órfãs).
      # Cobertura de UI/contrato fica em tests/unit/** (happy-dom/node).
      - name: Varrer artefatos sensíveis
        if: always()
        run: pnpm run test:artifacts

  gateway:
    name: Gateway Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/whatsapp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/whatsapp-gateway/go.mod
          cache-dependency-path: apps/whatsapp-gateway/go.sum
      - name: Executar testes
        run: go test ./...
      - name: Executar análise estática
        run: go vet ./...

  infrastructure:
    name: Compose e OpenSpec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validar scripts de entrypoint
        run: |
          for script in \
            infra/docker/php/entrypoint.sh \
            infra/docker/postgres/init-whatsapp-gateway.sh \
            infra/docker/traefik/init.sh; do
            sh -n "$script"
          done
          bash -n infra/docker/frontend/entrypoint.sh
      - name: Validar Docker Compose de desenvolvimento e produção
        run: |
          docker compose -f docker-compose.yml config --quiet
          # Garante ausência do sidecar MEI
          ! docker compose -f docker-compose.yml config --services | grep -Eq '^(mei|mei-worker)$'
          RELEASE_SHA=ci-synthetic RELEASE_TAG=sha-ci-synthetic \
            PROD_ENV_FILE=.env.example docker compose --env-file .env.example \
            -f docker-compose.prod.yml -p fiscal-hub config --quiet
          ! RELEASE_SHA=ci-synthetic RELEASE_TAG=sha-ci-synthetic \
            PROD_ENV_FILE=.env.example docker compose --env-file .env.example \
            -f docker-compose.prod.yml -p fiscal-hub config --services \
            | grep -Eq '^(mei|mei-worker)$'
      - name: Construir imagens de desenvolvimento e conferir extensões críticas
        run: |
          docker compose --profile dev build nginx php horizon frontend-dev whatsapp-gateway
          docker compose run --rm --no-deps --entrypoint php php -r \
            'exit(extension_loaded("curl") && extension_loaded("sodium") ? 0 : 1);'
      - name: Executar testes do worker FGTS Digital
        run: |
          docker compose run --rm --no-deps --entrypoint /opt/fgts-rpa/bin/python horizon \
            rpa/fgts_digital/test_worker.py
      - name: Validar OpenSpec (main specs + changes com delta)
        run: |
          set -euo pipefail
          # Main specs = source of truth (sempre strict)
          npx --yes @fission-ai/openspec@1.6.0 validate --specs --strict --json
          # Changes ativas: só se já tem delta em specs/ (proposal-only não quebra CI)
          # archive/ não é percorrido (basename archive skip)
          if [ -d openspec/changes ]; then
            for dir in openspec/changes/*/; do
              base=$(basename "$dir")
              [ "$base" = "archive" ] && continue
              if find "$dir/specs" -name 'spec.md' 2>/dev/null | grep -q .; then
                echo "==> validate change $base"
                npx --yes @fission-ai/openspec@1.6.0 validate "$base" --type change --strict --json
              else
                echo "==> skip change $base (sem delta specs ainda)"
              fi
            done
          fi
