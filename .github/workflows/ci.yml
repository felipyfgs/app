name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: curl, dom, mbstring, pcntl, pdo_sqlite, sodium, zip
      - uses: ramsey/composer-install@v3
        with:
          working-directory: backend
      - name: Validar dependências
        run: composer validate --strict --no-check-publish
      - name: Validar estilo
        run: vendor/bin/pint --test
      - name: Executar testes
        run: php artisan test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Instalar dependências
        run: pnpm install --frozen-lockfile
      - name: Validar lint
        run: pnpm run lint
      - name: Validar tipos
        run: pnpm run typecheck
      - name: Gerar SPA
        run: pnpm run generate
      - name: Executar testes unitários
        run: pnpm run test
      - name: Validar fidelidade ao arquétipo do change ativo
        run: pnpm run test:fidelity
      # Política: gate frontend = lint + typecheck + generate + vitest unit + fidelity.
      # Playwright E2E foi desabilitado (custo de RAM/CPU no VPS/CI e sessões órfãs).
      # Cobertura de UI/contrato fica em tests/unit/** (happy-dom/node).
      - name: Varrer artefatos sensíveis
        if: always()
        run: pnpm run test:artifacts

  infrastructure:
    name: Compose e OpenSpec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validar scripts operacionais
        run: |
          for script in \
            docker/php/entrypoint.sh docker/traefik/init.sh \
            docker/ops/backup.sh docker/ops/restore.sh docker/ops/deploy.sh \
            docker/ops/restore-smoke.sh; do
            sh -n "$script"
          done
          for script in \
            docker/frontend/entrypoint.sh docker/ops/verify.sh \
            docker/ops/secret-scan.sh docker/ops/prod-readiness.sh \
            docker/ops/release-manifest.sh docker/ops/host-backup-run.sh; do
            bash -n "$script"
          done
      - name: Validar Docker Compose de desenvolvimento e produção
        run: |
          docker compose config --quiet
          RELEASE_SHA=ci-synthetic RELEASE_TAG=sha-ci-synthetic \
            PROD_ENV_FILE=.env.example docker compose --env-file .env.example \
            -f compose.prod.yml -p fiscal-hub config --quiet
      - name: Construir imagens de desenvolvimento e conferir extensões críticas
        run: |
          docker compose --profile dev build nginx php frontend-dev
          docker compose run --rm --no-deps --entrypoint php php -r \
            'exit(extension_loaded("curl") && extension_loaded("sodium") ? 0 : 1);'
      - name: Construir imagens imutáveis de produção com SHA
        run: |
          export RELEASE_SHA="${GITHUB_SHA}"
          export RELEASE_TAG="sha-${RELEASE_SHA:0:12}"
          export BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RELEASE_SHA="$RELEASE_SHA" RELEASE_TAG="$RELEASE_TAG" BUILD_DATE="$BUILD_DATE" \
            PROD_ENV_FILE=.env.example docker compose --env-file .env.example \
            -f compose.prod.yml -p fiscal-hub \
            build acme-init traefik web php
          RELEASE_SHA="$RELEASE_SHA" RELEASE_TAG="$RELEASE_TAG" \
            PROD_ENV_FILE=.env.example docker compose --env-file .env.example \
            -f compose.prod.yml -p fiscal-hub pull socket-proxy
          docker tag "fiscal-hub-php:${RELEASE_TAG}" fiscal-hub-php:prod
          docker tag "fiscal-hub-web:${RELEASE_TAG}" fiscal-hub-web:prod
          php_rev=$(docker image inspect "fiscal-hub-php:${RELEASE_TAG}" \
            --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
          web_rev=$(docker image inspect "fiscal-hub-web:${RELEASE_TAG}" \
            --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
          test "$php_rev" = "$RELEASE_SHA"
          test "$web_rev" = "$RELEASE_SHA"
      - name: Validar runtimes e restauração isolada
        run: |
          docker run --rm --add-host php:127.0.0.1 fiscal-hub-web:prod nginx -t
          docker run --rm --entrypoint php-fpm fiscal-hub-php:prod -t
          ./docker/ops/restore-smoke.sh
      - name: Gates fail-closed de readiness e secret-scan
        run: |
          set -euo pipefail
          export RELEASE_SHA="${GITHUB_SHA}"
          ./docker/ops/test-prod-readiness.sh
          # manifesto sanitizado
          MANIFEST_DIR="$(mktemp -d)"
          RELEASE_SHA="$RELEASE_SHA" RELEASE_TAG="sha-${RELEASE_SHA:0:12}" \
            MANIFEST_DIR="$MANIFEST_DIR" ./docker/ops/release-manifest.sh
          # scanner: manifesto não deve conter padrões sensíveis
          ! grep -Eiq 'password|private_key|BEGIN ' "$MANIFEST_DIR"/*.json
      - name: Validar OpenSpec (main specs + changes com delta)
        run: |
          set -euo pipefail
          # Main specs = source of truth (sempre strict)
          npx --yes @fission-ai/openspec@1.6.0 validate --specs --strict --json
          # Changes ativas: só se já tem delta em specs/ (proposal-only não quebra CI)
          # archive/ não é percorrido (basename archive skip)
          if [ -d openspec/changes ]; then
            for dir in openspec/changes/*/; do
              base=$(basename "$dir")
              [ "$base" = "archive" ] && continue
              if find "$dir/specs" -name 'spec.md' 2>/dev/null | grep -q .; then
                echo "==> validate change $base"
                npx --yes @fission-ai/openspec@1.6.0 validate "$base" --type change --strict --json
              else
                echo "==> skip change $base (sem delta specs ainda)"
              fi
            done
          fi
