name: ${COMPOSE_PROJECT_NAME:-app}

x-php: &php
  image: ${COMPOSE_PROJECT_NAME:-app}-php:dev
  build: ./infra/docker/php
  env_file:
    - path: ./apps/api/.env
      required: false
  environment:
    APP_ENV: ${APP_ENV:-local}
    FISCAL_PROFILE: ${FISCAL_PROFILE:-dev}
    FISCAL_KILL_SWITCH: ${FISCAL_KILL_SWITCH:-false}
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: ${DB_DATABASE:-nfse}
    DB_USERNAME: ${DB_USERNAME:-nfse}
    DB_PASSWORD: ${DB_PASSWORD:-nfse}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    QUEUE_CONNECTION: redis
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    VAULT_DISK_ROOT: /var/vault
  volumes:
    - ./apps/api:/var/www/html
    - vault_data:/var/vault
    - private_storage:/var/www/html/storage/app/private
  restart: unless-stopped
  networks:
    - app

x-mei: &mei
  build:
    context: ./services/mei
    target: runtime
  environment:
    MEI_AUTOMATION_ENVIRONMENT: local
    MEI_AUTOMATION_REDIS_URL: redis://redis:6379/4
    MEI_AUTOMATION_HMAC_KEY_ID: ${MEI_AUTOMATION_HMAC_KEY_ID:-laravel}
    MEI_AUTOMATION_HMAC_SECRET: ${MEI_AUTOMATION_HMAC_SECRET:-}
    MEI_AUTOMATION_RESULT_TTL_SECONDS: ${MEI_AUTOMATION_RESULT_TTL_SECONDS:-900}
    MEI_AUTOMATION_ARTIFACT_TTL_SECONDS: ${MEI_AUTOMATION_ARTIFACT_TTL_SECONDS:-300}
    MEI_AUTOMATION_ARTIFACT_ROOT: /tmp/mei
    MEI_AUTOMATION_LIVE_EGRESS_ENABLED: ${MEI_AUTOMATION_LIVE_EGRESS_ENABLED:-false}
    MEI_AUTOMATION_FIXTURE_ENABLED: ${MEI_AUTOMATION_FIXTURE_ENABLED:-false}
    MEI_AUTOMATION_FIXTURE_ROOT: /app/fixtures
    MEI_AUTOMATION_CAPTCHA_DRIVER: ${MEI_AUTOMATION_CAPTCHA_DRIVER:-manual}
    MEI_AUTOMATION_CAPTCHA_BUDGET_MICROS: ${MEI_AUTOMATION_CAPTCHA_BUDGET_MICROS:-0}
    MEI_AUTOMATION_NOPECHA_ENABLED: ${MEI_AUTOMATION_NOPECHA_ENABLED:-false}
    MEI_AUTOMATION_NOPECHA_API_KEY: ${MEI_AUTOMATION_NOPECHA_API_KEY:-}
    MEI_AUTOMATION_NOPECHA_OPERATION_ALLOWLIST: ${MEI_AUTOMATION_NOPECHA_OPERATION_ALLOWLIST:-}
    MEI_AUTOMATION_NOPECHA_UNIT_COST_MICROS: ${MEI_AUTOMATION_NOPECHA_UNIT_COST_MICROS:-0}
    MEI_AUTOMATION_NOPECHA_TIMEOUT_SECONDS: ${MEI_AUTOMATION_NOPECHA_TIMEOUT_SECONDS:-180}
    MEI_AUTOMATION_NOPECHA_POLL_INTERVAL_SECONDS: ${MEI_AUTOMATION_NOPECHA_POLL_INTERVAL_SECONDS:-1}
    MEI_AUTOMATION_NOPECHA_PROXY_URL: ${MEI_AUTOMATION_NOPECHA_PROXY_URL:-}
    # Alinhado ao docapi: Chrome real + headed sob Xvfb (nao headless puro).
    MEI_AUTOMATION_BROWSER_HEADLESS: ${MEI_AUTOMATION_BROWSER_HEADLESS:-false}
    MEI_AUTOMATION_BROWSER_CHANNEL: ${MEI_AUTOMATION_BROWSER_CHANNEL:-chrome}
  volumes:
    - mei_artifacts:/tmp/mei
  depends_on:
    redis:
      condition: service_healthy
  init: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  networks:
    - app

services:
  nginx:
    image: ${COMPOSE_PROJECT_NAME:-app}-nginx:dev
    build:
      context: ./infra/docker/nginx
      target: dev
    ports:
      # 0.0.0.0: acesso remoto por IP:porta (dev). Postgres/Redis seguem em 127.0.0.1.
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./apps/api:/var/www/html:ro
      - ./apps/web/.output/public:/var/www/frontend:ro
    depends_on:
      php:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/up"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  php:
    <<: *php
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  horizon:
    <<: *php
    image: ${COMPOSE_PROJECT_NAME:-app}-horizon:dev
    command: ["php", "artisan", "horizon"]
    depends_on:
      php:
        condition: service_started
      redis:
        condition: service_healthy

  scheduler:
    <<: *php
    image: ${COMPOSE_PROJECT_NAME:-app}-scheduler:dev
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      php:
        condition: service_started
      redis:
        condition: service_healthy

  mei:
    <<: *mei
    image: ${COMPOSE_PROJECT_NAME:-app}-mei:dev
    networks:
      app:
        aliases:
          - mei
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  mei-worker:
    <<: *mei
    image: ${COMPOSE_PROJECT_NAME:-app}-mei-worker:dev
    command: ["celery", "-A", "mei.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=1", "--max-tasks-per-child=50"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A mei.celery_app:celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  frontend-dev:
    image: ${COMPOSE_PROJECT_NAME:-app}-frontend-dev:dev
    build: ./infra/docker/frontend
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - frontend_node_modules:/app/node_modules
    ports:
      # 0.0.0.0: Nuxt dev acessível remotamente por IP:porta
      - "${FRONTEND_DEV_PORT:-3000}:3000"
    environment:
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
      NUXT_SANCTUM_PROXY: "true"
      NUXT_SANCTUM_PROXY_BASE: http://nginx
      NUXT_DEVTOOLS: ${NUXT_DEVTOOLS:-true}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      HOST: 0.0.0.0
      FRONTEND_DEV_PORT: ${FRONTEND_DEV_PORT:-3000}
      # IP/host visto pelo browser remoto (HMR WebSocket). Ex.: PUBLIC_HOST=74.x.x.x
      NUXT_DEV_HMR_HOST: ${PUBLIC_HOST:-}
      PUBLIC_HOST: ${PUBLIC_HOST:-}
    init: true
    profiles: ["dev"]
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nfse}
      POSTGRES_USER: ${DB_USERNAME:-nfse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nfse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres_data:
  redis_data:
  vault_data:
  private_storage:
  frontend_node_modules:
  mei_artifacts:

networks:
  app:
    driver: bridge
