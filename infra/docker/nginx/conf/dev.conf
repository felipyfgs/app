server {
    listen 80;
    server_name _;
    charset utf-8;
    client_max_body_size 25M;
    server_tokens off;
    absolute_redirect off;

    root /var/www/frontend;
    index index.html;

    # Laravel API and Sanctum (same-origin)
    location ^~ /api/ {
        try_files $uri @laravel;
    }

    location ^~ /sanctum/ {
        try_files $uri @laravel;
    }

    location ^~ /storage/ {
        try_files $uri @laravel;
    }

    location = /up {
        allow 127.0.0.1;
        allow ::1;
        allow 172.16.0.0/12;
        deny all;
        try_files $uri @laravel;
    }

    # Fortify (views=false): POST/etc → Laravel; GET de páginas SPA → index.html
    location = /login {
        error_page 418 = @laravel;
        if ($request_method != GET) {
            return 418;
        }
        try_files /index.html =404;
    }

    location = /logout {
        try_files $uri @laravel;
    }

    location = /forgot-password {
        error_page 418 = @laravel;
        if ($request_method != GET) {
            return 418;
        }
        try_files /index.html =404;
    }

    location ^~ /reset-password {
        error_page 418 = @laravel;
        if ($request_method != GET) {
            return 418;
        }
        try_files $uri /index.html;
    }

    location = /two-factor-challenge {
        error_page 418 = @laravel;
        if ($request_method != GET) {
            return 418;
        }
        try_files /index.html =404;
    }

    location ^~ /user/ {
        try_files $uri @laravel;
    }

    # Defesa em profundidade: Horizon continua sujeito ao gate do Laravel e,
    # no edge local, só é alcançável pelo host/rede privada do Compose.
    location = /horizon {
        allow 127.0.0.1;
        allow ::1;
        allow 172.16.0.0/12;
        deny all;
        try_files $uri @laravel;
    }

    location ^~ /horizon/ {
        allow 127.0.0.1;
        allow ::1;
        allow 172.16.0.0/12;
        deny all;
        try_files $uri @laravel;
    }

    location @laravel {
        root /var/www/html/public;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass php:9000;
        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # PWA: service worker e manifest sem cache longo (atualização confiável)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
        try_files $uri =404;
    }

    location ~* ^/(workbox|sw).*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA assets and history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
