server {
    listen 80;
    server_name app.inovaicontabil.com.br;
    charset utf-8;
    client_max_body_size 25M;
    server_tokens off;
    absolute_redirect off;

    # Única origem de proxy confiável: IP fixo do Traefik na rede edge.
    # O Traefik sanitiza X-Forwarded-For de clientes não confiáveis.
    set_real_ip_from 172.31.255.2;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    root /usr/share/nginx/html;
    index index.html;

    location ^~ /api/ { try_files $uri @laravel; }
    location ^~ /sanctum/ { try_files $uri @laravel; }
    location ^~ /storage/ { try_files $uri @laravel; }
    location ^~ /user/ { try_files $uri @laravel; }
    location = /logout { try_files $uri @laravel; }

    location = /up {
        deny all;
    }

    location = /login {
        error_page 418 = @laravel;
        if ($request_method != GET) { return 418; }
        try_files /index.html =404;
    }

    location = /forgot-password {
        error_page 418 = @laravel;
        if ($request_method != GET) { return 418; }
        try_files /index.html =404;
    }

    location ^~ /reset-password {
        error_page 418 = @laravel;
        if ($request_method != GET) { return 418; }
        try_files $uri /index.html;
    }

    location = /two-factor-challenge {
        error_page 418 = @laravel;
        if ($request_method != GET) { return 418; }
        try_files /index.html =404;
    }

    location = /horizon {
        deny all;
    }

    location ^~ /horizon/ {
        deny all;
    }

    location @laravel {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PORT 443;
        fastcgi_pass php:9000;
        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
        try_files $uri =404;
    }

    location ~* ^/(workbox|sw).*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / { try_files $uri $uri/ /index.html; }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* { deny all; }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
}
