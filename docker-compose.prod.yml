x-php: &php
  image: fiscal-hub-php:${RELEASE_TAG:-prod}
  build:
    context: ./infra/docker/php
    target: prod
    additional_contexts:
      app: ./apps/api
    args:
      RELEASE_SHA: ${RELEASE_SHA:-unknown}
      BUILD_DATE: ${BUILD_DATE:-}
  env_file:
    - path: ${PROD_ENV_FILE:-.env}
      required: true
  environment:
    APP_ENV: production
    FISCAL_PROFILE: ${FISCAL_PROFILE:-production}
    FISCAL_KILL_SWITCH: ${FISCAL_KILL_SWITCH:-true}
    APP_DEBUG: "false"
    APP_URL: https://app.inovaicontabil.com.br
    RELEASE_SHA: ${RELEASE_SHA:-}
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: ${DB_DATABASE:-nfse}
    DB_USERNAME: ${DB_USERNAME:-nfse}
    DB_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD em .env}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    QUEUE_CONNECTION: redis
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
    REVERB_APP_ID: ${REVERB_APP_ID:-communication-disabled}
    REVERB_APP_KEY: ${REVERB_APP_KEY:-communication-disabled}
    REVERB_APP_SECRET: ${REVERB_APP_SECRET:-communication-disabled}
    REVERB_HOST: reverb
    REVERB_PORT: 8081
    REVERB_SCHEME: http
    REVERB_SERVER_PORT: 8081
    REVERB_SCALING_ENABLED: "true"
    REVERB_ALLOWED_ORIGINS: ${REVERB_ALLOWED_ORIGINS:-https://app.inovaicontabil.com.br}
    COMMUNICATION_ENABLED: ${COMMUNICATION_ENABLED:-false}
    WHATSAPP_GATEWAY_ENABLED: ${WHATSAPP_GATEWAY_ENABLED:-false}
    WHATSAPP_GATEWAY_URL: http://whatsapp-gateway:8080
    SESSION_DOMAIN: app.inovaicontabil.com.br
    SESSION_SECURE_COOKIE: "true"
    SESSION_SAME_SITE: lax
    SANCTUM_STATEFUL_DOMAINS: app.inovaicontabil.com.br
    VAULT_DISK_ROOT: /var/vault
  volumes:
    - vault_data:/var/vault
    - private_storage:/var/www/html/storage/app/private
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  networks:
    - app
  security_opt:
    - no-new-privileges:true

services:
  acme-init:
    build:
      context: ./infra/docker/traefik
      target: init
    volumes:
      - acme:/letsencrypt
    restart: "no"
    network_mode: none
    security_opt:
      - no-new-privileges:true

  traefik:
    image: fiscal-hub-traefik:prod
    build:
      context: ./infra/docker/traefik
      target: prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command:
      - --api.dashboard=false
      - --ping=true
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://socket-proxy:2375
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${EDGE_NETWORK:-fiscal-hub-edge}
      - --entrypoints.web.address=:80
      - --entrypoints.web.forwardedheaders.insecure=false
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.forwardedheaders.insecure=false
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?defina ACME_EMAIL em .env}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - acme:/letsencrypt
    depends_on:
      acme-init:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      edge:
        ipv4_address: 172.31.255.2
      socket:

  socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    environment:
      CONTAINERS: 1
      EVENTS: 1
      NETWORKS: 1
      PING: 1
      POST: 0
      VERSION: 1
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2375/_ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - socket

  web:
    image: fiscal-hub-web:${RELEASE_TAG:-prod}
    build:
      context: ./infra/docker/nginx
      target: prod
      additional_contexts:
        ui: ./apps/web
      args:
        RELEASE_SHA: ${RELEASE_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-}
        NUXT_PUBLIC_COMMUNICATION_ENABLED: ${COMMUNICATION_ENABLED:-false}
        NUXT_PUBLIC_REVERB_APP_KEY: ${REVERB_APP_KEY:-communication-disabled}
        NUXT_PUBLIC_REVERB_HOST: app.inovaicontabil.com.br
        NUXT_PUBLIC_REVERB_PORT: 443
        NUXT_PUBLIC_REVERB_SCHEME: https
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${EDGE_NETWORK:-fiscal-hub-edge}
      traefik.http.routers.app.rule: Host(`app.inovaicontabil.com.br`)
      traefik.http.routers.app.entrypoints: websecure
      traefik.http.routers.app.tls: "true"
      traefik.http.routers.app.tls.certresolver: letsencrypt
      traefik.http.services.app.loadbalancer.server.port: "80"
    depends_on:
      php:
        condition: service_healthy
      reverb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/index.html"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
      - app

  php:
    <<: *php
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  horizon:
    <<: *php
    image: fiscal-hub-php-rpa:${RELEASE_TAG:-prod}
    build:
      context: ./infra/docker/php
      target: rpa-prod
      additional_contexts:
        app: ./apps/api
      args:
        RELEASE_SHA: ${RELEASE_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-}
    command: ["php", "artisan", "horizon"]
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    <<: *php
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    <<: *php
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8081"]
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "$$s=@fsockopen('127.0.0.1',8081); exit($$s ? 0 : 1);"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nfse}
      POSTGRES_USER: ${DB_USERNAME:-nfse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD em .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - app

  whatsapp-gateway-db-init:
    image: postgres:17-alpine
    entrypoint: ["/bin/sh", "/opt/fiscal-hub/init-whatsapp-gateway.sh"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DB_DATABASE:-nfse}
      POSTGRES_USER: ${DB_USERNAME:-nfse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD em .env}
      WHATSAPP_GATEWAY_DB_USER: ${WHATSAPP_GATEWAY_DB_USER:-whatsapp_gateway}
      WHATSAPP_GATEWAY_DB_PASSWORD: ${WHATSAPP_GATEWAY_DB_PASSWORD:-communication-disabled}
    volumes:
      - ./infra/docker/postgres/init-whatsapp-gateway.sh:/opt/fiscal-hub/init-whatsapp-gateway.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    networks:
      - app

  whatsapp-gateway:
    image: fiscal-hub-whatsapp-gateway:${RELEASE_TAG:-prod}
    build:
      context: .
      dockerfile: infra/docker/whatsapp-gateway/Dockerfile
      args:
        RELEASE_SHA: ${RELEASE_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-}
    environment:
      WHATSAPP_GATEWAY_ENABLED: ${WHATSAPP_GATEWAY_ENABLED:-false}
      WHATSAPP_GATEWAY_DATABASE_URL: ${WHATSAPP_GATEWAY_DATABASE_URL:-}
      WHATSAPP_GATEWAY_EVENTS_URL: http://web/api/internal/v1/communication/gateway/events
      WHATSAPP_GATEWAY_MEDIA_URL: http://web/api/internal/v1/communication/gateway/media
      WHATSAPP_GATEWAY_HMAC_KEY_ID: ${WHATSAPP_GATEWAY_HMAC_KEY_ID:-}
      WHATSAPP_GATEWAY_HMAC_SECRET: ${WHATSAPP_GATEWAY_HMAC_SECRET:-}
      WHATSAPP_GATEWAY_HMAC_PREVIOUS_KEY_ID: ${WHATSAPP_GATEWAY_HMAC_PREVIOUS_KEY_ID:-}
      WHATSAPP_GATEWAY_HMAC_PREVIOUS_SECRET: ${WHATSAPP_GATEWAY_HMAC_PREVIOUS_SECRET:-}
      WHATSAPP_GATEWAY_DATA_KEY: ${WHATSAPP_GATEWAY_DATA_KEY:-}
      WHATSAPP_GATEWAY_HMAC_WINDOW: ${WHATSAPP_GATEWAY_HMAC_WINDOW:-5m}
      WHATSAPP_GATEWAY_NONCE_TTL: ${WHATSAPP_GATEWAY_NONCE_TTL:-10m}
      WHATSAPP_GATEWAY_SESSION_CAPACITY: ${WHATSAPP_GATEWAY_SESSION_CAPACITY:-250}
      WHATSAPP_GATEWAY_LEASE_TTL: ${WHATSAPP_GATEWAY_LEASE_TTL:-30s}
      WHATSAPP_GATEWAY_HEARTBEAT_EVERY: ${WHATSAPP_GATEWAY_HEARTBEAT_EVERY:-10s}
      WHATSAPP_GATEWAY_MEDIA_MAX_BYTES: ${COMMUNICATION_MEDIA_MAX_BYTES:-20971520}
    volumes:
      - whatsapp_gateway_spool:/var/lib/whatsapp-gateway/spool
    expose:
      - "8080"
    depends_on:
      whatsapp-gateway-db-init:
        condition: service_completed_successfully
      web:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    networks:
      - app

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - app

volumes:
  acme:
  postgres_data:
  redis_data:
  vault_data:
  private_storage:
  whatsapp_gateway_spool:

networks:
  edge:
    name: ${EDGE_NETWORK:-fiscal-hub-edge}
    ipam:
      config:
        - subnet: 172.31.255.0/29
  app:
    name: ${APP_NETWORK:-fiscal-hub-app}
  socket:
    name: ${SOCKET_NETWORK:-fiscal-hub-socket}
    internal: true
