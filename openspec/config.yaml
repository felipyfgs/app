schema: spec-driven

# Project context (shown to AI when creating artifacts)
context: |
  Idioma: sempre português do Brasil (pt-BR) em artefatos OpenSpec, commits e comunicação com o usuário.
  Domínio: plataforma SaaS multi-escritório (MonitorHub) para escritórios contábeis monitorarem contribuintes;
    NÃO é portal de clientes finais / contribuintes.
  Modelo comercial: a software house opera a plataforma; cada Office é tenant; isolamento por office_id em
    dados fiscais e de negócio do tenant.
  Contrato SERPRO Integra Contador: global da software house (e-CNPJ contratante, Consumer Key/Secret, mTLS);
    tenants NÃO recebem nem controlam credenciais SERPRO. Cadeia: Contratante → Autor do Pedido → Contribuinte.
  Plano de controle global (sem office_id como atalho): serpro_contracts, platform_memberships, catálogo/preços
    SERPRO, consolidação de fatura, flags globais. Plano de dados do tenant: assinatura, autor, termo,
    procurações, consumo atribuído, dados fiscais — sempre com office_id.
  Stack: monorepo backend/ (Laravel 13, PHP 8.4) + frontend/ (Nuxt 4, Nuxt UI 4 SPA);
    Nginx same-origin; PostgreSQL; Redis/Horizon; Docker Compose local.
  Auth tenant: Fortify + Sanctum (cookie/CSRF/TOTP); papéis ADMIN / OPERATOR / VIEWER do escritório.
  Auth plataforma: PLATFORM_ADMIN separado; não herda leitura fiscal de tenants.
  Segredos: cofre com criptografia de envelope (SecureObjectStore); VAULT_MASTER_KEY fora do DB/backups comuns;
    PFX só em memória (libcurl BLOB); nunca expor PFX/senha/chave/PEM/Consumer Secret/tokens/Termo via API,
    logs ou exportação.
  Canais documentais (ADN/SEFAZ): cliente próprio + mTLS; distribuição por NSU (não por data) no ADN;
    cursores por estabelecimento+ambiente; persistir página antes de avançar NSU; sem salto silencioso.
  CNPJ: 14 caracteres texto, numérico ou alfanumérico; maiúsculas, sem máscara, nunca numérico.
  Não-objetivos MVP: scraping de portal; FGTS Digital integral (sem API pública); gateway de pagamento /
    cobrança bancária da assinatura; portal do contribuinte final; cloud KMS; sublicenciar credenciais SERPRO;
    mutações fiscais de alto risco no piloto somente leitura. Multi-escritório SaaS É o modelo (não é non-goal).
  Gate: evidência comercial/jurídica escrita do SERPRO (uso SaaS, franquia/excedente, redistribuição) é
    BLOQUEANTE antes de piloto produtivo — ver docs/ops/serpro-integra-contador-commercial-legal-evidence.md.

# Per-artifact rules
rules:
  proposal:
    - Escrever integralmente em pt-BR.
    - Incluir seção de Non-goals / Não-objetivos.
    - Não reinventar stack ou decisões já fixadas no design do change ativo, salvo mudança explícita de escopo.
  design:
    - Escrever integralmente em pt-BR.
    - Documentar decisões, trade-offs e riscos; preferir interfaces (SecureObjectStore, AdnContributorClient, IntegraContadorClient).
    - Respeitar restrições de segurança (sem PEM em disco, sem rota de recuperação de certificado).
    - Separar explicitamente plano de controle global e plano de dados com office_id.
  specs:
    - Escrever requisitos e cenários integralmente em pt-BR.
    - Usar MUST/SHALL/SHOULD de forma explícita nos requisitos.
    - Cobrir falhas de NSU/decodificação, tenancy multi-escritório, isolamento office_id e não exposição de material sensível quando o capability envolver isso.
  tasks:
    - Escrever integralmente em pt-BR.
    - Quebrar em tarefas verificáveis e ordenadas (domínio/gates → plano de controle → cofre/SERPRO → trial → piloto → escala).
    - Cada tarefa deve ser implementável de forma independente o bastante para marcar checkbox ao concluir.
