schema: spec-driven

# Stack/tenancy/segurança: AGENTS.md na raiz.
# Artefatos: openspec/specs/ e openspec/changes/ (ainda vazios — criar via propose).
# Idioma: pt-BR obrigatório em todos os artefatos OpenSpec e na comunicação com o usuário.

context: |
  Idioma: português do Brasil (pt-BR) em proposal, design, specs, tasks, archive e
  qualquer texto de change. Comunicação com o usuário também em pt-BR (ver AGENTS.md).
  Identificadores de código e nomes de API permanecem como no repositório.

  Produto: hub fiscal multi-escritório (NFS-e ADN, SEFAZ, SERPRO Integra, monitoramento).
  Monorepo sem package.json na raiz — orquestração Makefile + Docker Compose.

  Layout OpenSpec (versionado):
  - openspec/specs/<capability>/spec.md — contrato permanente
  - openspec/changes/<change>/ — change ativa
  - openspec/changes/archive/YYYY-MM-DD-<change>/ — pós-archive

  Ciclo: propose → apply → verify → archive → commit no mesmo dia.
  Change pequena: 1 capability (máx. 2), ≤ ~20 tasks, non-goals explícitos.

  Stack: backend Laravel 13 / PHP 8.4 / Horizon; frontend Nuxt 4 SPA (ssr:false) + Nuxt UI;
  nginx same-origin; make dev para HMR.

  Tenancy: Office + CurrentOffice; nunca confiar office_id do client;
  PLATFORM_ADMIN sem acesso fiscal implícito a tenants.

  Segurança: vault SecureObjectStore; flags default OFF; sem PFX/tokens/XML em JSON.

  UI: panel-ui → ui-archetype; template .reference/nuxt-dashboard-template @ 0f30c09.

  Specs principais: nenhuma ainda — criar com as changes.

rules:
  proposal:
    - "Escrever proposal inteiro em português do Brasil (pt-BR) — títulos, Why, What Changes, Capabilities, Impact."
    - "1 capability principal (máx. 2); non-goals para live SERPRO, jurídico e mutações."
  specs:
    - "Specs (delta e main) em pt-BR: Purpose, Requirements, Scenarios; identificadores de código em inglês quando forem nomes reais do repo."
    - "Main specs só com SHALL que o código atende."
  design:
    - "Design em pt-BR: decisões, trade-offs e riscos; não copiar o proposal."
  tasks:
    - "Tasks em pt-BR; verificáveis; [x] só com evidência real."
    - "Task final de archive/sync + commit quando fechar software."
