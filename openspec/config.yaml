schema: spec-driven

# Project context (shown to AI when creating artifacts)
context: |
  Idioma: sempre português do Brasil (pt-BR) em artefatos OpenSpec, commits e comunicação com o usuário.
  Domínio: captura de NFS-e via ADN para escritório contábil interno (não portal de clientes finais).
  Stack planejada: monorepo backend/ (Laravel 13, PHP 8.4) + frontend/ (Nuxt 4, Nuxt UI 4 SPA);
    Nginx same-origin; PostgreSQL; Redis/Horizon; Docker Compose local.
  Auth: Fortify + Sanctum (cookie/CSRF/TOTP); papéis ADMIN / OPERATOR / VIEWER; tenancy por office_id.
  Segredos: cofre com criptografia de envelope (SecureObjectStore); VAULT_MASTER_KEY fora do DB/backups comuns;
    PFX só em memória (libcurl BLOB); nunca expor PFX/senha/chave/PEM via API, logs ou exportação.
  ADN: cliente próprio AdnContributorClient + mTLS; distribuição por NSU (não por data); cursor por
    estabelecimento+ambiente; persistir página antes de avançar NSU; sem salto silencioso de documento.
  CNPJ: 14 caracteres texto, numérico ou alfanumérico; maiúsculas, sem máscara, nunca numérico.
  Não-objetivos MVP: scraping do portal, APIs municipais, emitir/cancelar NFS-e, DANFSe/PDF, portal do cliente,
    KMS em nuvem, multi-escritório SaaS.

# Per-artifact rules
rules:
  proposal:
    - Escrever integralmente em pt-BR.
    - Incluir seção de Non-goals / Não-objetivos.
    - Não reinventar stack ou decisões já fixadas no design do change ativo, salvo mudança explícita de escopo.
  design:
    - Escrever integralmente em pt-BR.
    - Documentar decisões, trade-offs e riscos; preferir interfaces (SecureObjectStore, AdnContributorClient).
    - Respeitar restrições de segurança (sem PEM em disco, sem rota de recuperação de certificado).
  specs:
    - Escrever requisitos e cenários integralmente em pt-BR.
    - Usar MUST/SHALL/SHOULD de forma explícita nos requisitos.
    - Cobrir falhas de NSU/decodificação, tenancy e não exposição de material sensível quando o capability envolver isso.
  tasks:
    - Escrever integralmente em pt-BR.
    - Quebrar em tarefas verificáveis e ordenadas (infra → cofre → mTLS → piloto → escala).
    - Cada tarefa deve ser implementável de forma independente o bastante para marcar checkbox ao concluir.
