services:
  php:
    environment:
      APP_ENV: testing
      APP_DEBUG: "false"
      DB_DATABASE: nfse_e2e
      CACHE_STORE: array
      SESSION_DRIVER: database
      QUEUE_CONNECTION: sync
      FISCAL_KILL_SWITCH: "true"
      FISCAL_DEMO_OFFICE_SLUG: contador
      FISCAL_DEMO_SENTINEL_SLUG: e2e-sentinel
      SERPRO_DEFAULT_ENVIRONMENT: TRIAL
      SERPRO_READINESS_ALLOW_LIVE: "false"
      MEI_AUTOMATION_LIVE_EGRESS_ENABLED: "false"
      APP_URL: http://127.0.0.1:18080
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:13000,127.0.0.1,127.0.0.1:13000,127.0.0.1:18080
      SESSION_SECURE_COOKIE: "false"
  nginx:
    environment:
      APP_ENV: testing
  frontend-dev:
    environment:
      NUXT_DEVTOOLS: "false"
      NUXT_PWA_DEV: "false"
      NUXT_SANCTUM_PROXY: "true"
      NUXT_SANCTUM_PROXY_BASE: http://nginx
      FRONTEND_DEV_PORT: 3000
  postgres:
    environment:
      POSTGRES_DB: nfse_e2e
  horizon:
    environment:
      APP_ENV: testing
      DB_DATABASE: nfse_e2e
      FISCAL_KILL_SWITCH: "true"
      QUEUE_CONNECTION: sync
  scheduler:
    environment:
      APP_ENV: testing
      DB_DATABASE: nfse_e2e
      FISCAL_KILL_SWITCH: "true"
      QUEUE_CONNECTION: sync
